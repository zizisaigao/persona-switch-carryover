experiment:
  default_condition: A_summary_to_B
  default_persona_a: INTJ
  default_persona_b: ESFP
  trials_per_sample: 1
  random_seed: 42

conditions:
  MBTI_only:
    active_persona_stage_2: B
    use_history: false
    use_summary: false
    do_warmup: false
    switch_strength: default
    retain_mechanism: none
  A_history_to_B:
    active_persona_stage_2: B
    use_history: true
    use_summary: false
    do_warmup: true
    switch_strength: default
    retain_mechanism: history
  A_summary_to_B:
    active_persona_stage_2: B
    use_history: false
    use_summary: true
    do_warmup: true
    switch_strength: default
    retain_mechanism: summary
  A3_history_to_B:
    active_persona_stage_2: B
    use_history: true
    use_summary: false
    do_warmup: true
    switch_strength: default
    retain_mechanism: history
    reinforcement_persona: A
    reinforcement_repeats: 3
  A3_summary_to_B:
    active_persona_stage_2: B
    use_history: false
    use_summary: true
    do_warmup: true
    switch_strength: default
    retain_mechanism: summary
    reinforcement_persona: A
    reinforcement_repeats: 3
  B3_history_to_B:
    active_persona_stage_2: B
    use_history: true
    use_summary: false
    do_warmup: true
    warmup_persona_override: B
    switch_strength: default
    retain_mechanism: history
    reinforcement_repeats: 3
  B3_summary_to_B:
    active_persona_stage_2: B
    use_history: false
    use_summary: true
    do_warmup: true
    warmup_persona_override: B
    switch_strength: default
    retain_mechanism: summary
    reinforcement_repeats: 3
  B_history_to_B:
    active_persona_stage_2: B
    use_history: true
    use_summary: false
    do_warmup: true
    warmup_persona_override: B
    switch_strength: default
    retain_mechanism: history
  B_summary_to_B:
    active_persona_stage_2: B
    use_history: false
    use_summary: true
    do_warmup: true
    warmup_persona_override: B
    switch_strength: default
    retain_mechanism: summary
  MBTI_only_strong:
    active_persona_stage_2: B
    use_history: false
    use_summary: false
    do_warmup: false
    switch_strength: strong
    retain_mechanism: none
  A_history_to_B_strong:
    active_persona_stage_2: B
    use_history: true
    use_summary: false
    do_warmup: true
    switch_strength: strong
    retain_mechanism: history
  A_summary_to_B_strong:
    active_persona_stage_2: B
    use_history: false
    use_summary: true
    do_warmup: true
    switch_strength: strong
    retain_mechanism: summary
  B_history_to_B_strong:
    active_persona_stage_2: B
    use_history: true
    use_summary: false
    do_warmup: true
    warmup_persona_override: B
    switch_strength: strong
    retain_mechanism: history
  B_summary_to_B_strong:
    active_persona_stage_2: B
    use_history: false
    use_summary: true
    do_warmup: true
    warmup_persona_override: B
    switch_strength: strong
    retain_mechanism: summary
  Neutral_summary_to_B:
    active_persona_stage_2: B
    use_history: false
    use_summary: true
    do_warmup: true
    warmup_persona_override: NEUTRAL
    switch_strength: default
    retain_mechanism: summary

warmup:
  turns: 3
  prompts:
    - "How do you usually approach a difficult long-term goal?"
    - "What matters more when making a decision: logic, relationships, or momentum?"
    - "Describe how you would advise someone who feels stuck."
  reinforcement_prompt_blocks:
    - - "When a team is divided on what to do next, how do you usually help move the group forward?"
      - "If a plan starts breaking down halfway through, what do you change first?"
      - "What kind of mistake bothers you more: inefficiency, unfairness, or lack of follow-through?"
    - - "How do you decide whether to follow a proven method or improvise in the moment?"
      - "When someone asks for advice during a stressful transition, what do you focus on first?"
      - "What makes you trust that a difficult decision is the right one?"

budget:
  max_samples_per_run: 9999
  max_total_requests: 100
  stop_on_error: false

runtime:
  mock_mode: true
  use_cache: true
  resume: true
  save_messages: true

paths:
  samples_csv: data/processed/samples_toy.csv
  raw_generations: outputs/raw_generations/generations.jsonl
  api_usage_log: outputs/logs/api_usage.jsonl
  cache_dir: outputs/cache
  scored_dir: outputs/scored
