default_model:
  provider: openrouter
  model_name: openai/gpt-4o-mini
  api_key_env: OPENROUTER_API_KEY
  temperature: 0.3
  max_tokens: 300
  timeout_seconds: 60
  max_retries: 3

mock_model:
  provider: mock
  model_name: mock/persona-simulator
  api_key_env: ""
  temperature: 0.0
  max_tokens: 200
  timeout_seconds: 5
  max_retries: 0

gemini_flash_lite:
  provider: gemini
  model_name: gemini-2.5-flash-lite
  api_key_env: GEMINI_API_KEY
  temperature: 0.3
  max_tokens: 300
  timeout_seconds: 60
  max_retries: 3
